name: Register App CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: register-app-pipeline
  RELEASE: 1.0.0
  DOCKER_USER: andynze4
  IMAGE_NAME: andynze4/register-app-pipeline
  IMAGE_TAG: 1.0.0-${{ github.run_number }}

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout from SCM
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Application
        run: mvn clean package

      - name: Test Application
        run: mvn test

      - name: SonarQube Analysis
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.JENKINS_SONARQUBE_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.login=${SONAR_TOKEN}

      - name: Wait for SonarQube Quality Gate
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.JENKINS_SONARQUBE_TOKEN }}
        run: |
          echo "Reading Sonar task report..."
          if [ ! -f target/sonar/report-task.txt ]; then
            echo "target/sonar/report-task.txt not found"
            exit 1
          fi

          CE_TASK_URL=$(grep ceTaskUrl target/sonar/report-task.txt | cut -d'=' -f2-)
          if [ -z "$CE_TASK_URL" ]; then
            echo "Could not find ceTaskUrl in report-task.txt"
            exit 1
          fi

          echo "CE_TASK_URL=$CE_TASK_URL"

          for i in {1..30}; do
            STATUS=$(curl -s -u ${SONAR_TOKEN}: "$CE_TASK_URL" | jq -r '.task.status')
            echo "Current Sonar task status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              ANALYSIS_ID=$(curl -s -u ${SONAR_TOKEN}: "$CE_TASK_URL" | jq -r '.task.analysisId')
              QG_STATUS=$(curl -s -u ${SONAR_TOKEN}: "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${ANALYSIS_ID}" | jq -r '.projectStatus.status')
              echo "Quality Gate Status: $QG_STATUS"

              if [ "$QG_STATUS" != "OK" ]; then
                echo "Quality Gate failed: $QG_STATUS"
                exit 1
              fi
              exit 0
            fi

            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "SonarQube background task failed with status: $STATUS"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for SonarQube Quality Gate"
          exit 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      - name: Trivy Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image $IMAGE_NAME:latest \
            --no-progress \
            --scanners vuln \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format table

      - name: Cleanup Artifacts
        if: always()
        run: |
          docker rmi $IMAGE_NAME:$IMAGE_TAG || true
          docker rmi $IMAGE_NAME:latest || true

      - name: Trigger CD Pipeline
        env:
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          curl -v -k \
            --user clouduser:${JENKINS_API_TOKEN} \
            -X POST \
            -H 'cache-control: no-cache' \
            -H 'content-type: application/x-www-form-urlencoded' \
            --data "IMAGE_TAG=${IMAGE_TAG}" \
            "http://ec2-34-238-248-65.compute-1.amazonaws.com:8080/job/gitops-register-app-cd/buildWithParameters?token=gitops-token"

      # Optional notification placeholders
      # - name: Notify Success
      #   if: success()
      #   run: echo "Add email or Slack notification here"
      #
      # - name: Notify Failure
      #   if: failure()
      #   run: echo "Add email or Slack notification here"
